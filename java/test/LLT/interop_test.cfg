[suffix]
  cj = //
  info = //
[condition]
condition =
  LLVM
  Unix
[internal-var]
  compiler = cjc -j4
  clang = clang

  compile_shared_lib_opt = --output-type=dylib

  # java interoperation
  javac=javac
  java=java

  cp_cj_loader_java_interop = -cp .:${CANGJIE_HOME}/lib/library-loader.jar

  # for now java interop is manually tested on linux_x86_64
  cjc_interop_link_java = -ljava.internal -ljava.lang

  # cjpm mac LC_RPATH
  run_rpath = export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/darwin_aarch64_cjnative &&

[description]
  title = interop_test
[env]
  LD_LIBRARY_PATH=./:$LD_LIBRARY_PATH
  LC_ALL=en_US.UTF-8
